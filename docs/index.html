<!DOCTYPE html>

<html lang="en">

<head>

  <style>

      display: flex;

      align-items: center;

      justify-content: center;

      min-height: 100vh;

      text-align: center;

      padding: 2rem;

    }

    svg { height: 48px; width: auto; margin-bottom: 1.5rem; }

    h1 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: #C8A45C; margin-bottom: 0.5rem; }

    p  { color: rgba(255,255,255,0.45); font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase; }

<body>

  <p>Daily signal briefings — Accelerated Velocity Consulting</p>
